{% extends "base.html" %}
{% block content %}
    {% for item in news_items %}
        <article>
            {% if item.main_image %}
                <img src="{{ item.main_image.url }}" alt="{{ item.title }}" style="max-height:200px; width:auto;">
            {% endif %}
            <h2><a href="/news/{{ item.slug }}/">{{ item.title }}</a></h2>
            <p>{{ item.preview_text|default:item.content|truncatewords:30 }}</p>
            <small>{{ item.created_at|date:"d.m.Y" }}</small>
        </article>
        <hr>
    {% empty %}
        <p>Новостей пока нет.</p>
    {% endfor %}
{% endblock %}

name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          curl --retry 4 --retry-delay 15 --retry-all-errors \
            -X POST https://voa-irk.ru/deploy.php \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -d '{"ref": "refs/heads/main"}' \
            --fail
